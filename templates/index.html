<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillSwap | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary text-white">
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="card text-dark p-4 shadow-lg" style="width: 400px;">
            <div class="text-center mb-4">
                <h3>Skill Exchange System</h3>
                <p class="text-muted">A Decentralized Knowledge Economy</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-info py-2">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('main.index') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            
            <div class="mt-3 text-center">
                <small>Don't have an account? <a href="{{ url_for('main.register') }}" class="text-decoration-none">Register here</a></small>
            </div>
        </div>
    </div>
</body>
</html>
